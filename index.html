<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sage AI | Sustainable Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Small emergency CSS fix to ensure landing displays correctly */
        #login-view { min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 10; }
        .flex-center { display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .hidden { display: none !important; }
        #app-view { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        
        /* Loading Animation for AI */
        .typing-shimmer { 
            width: 60px; height: 20px; 
            background: linear-gradient(90deg, #2ecc7122 25%, #2ecc71 50%, #2ecc7122 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div class="gradient-bg"></div>
    <div class="grid-overlay"></div>

    <div id="login-view">
        <nav class="landing-nav">
            <div class="logo">SAGE<span>AI</span></div>
            <button class="btn-outline" onclick="handleLogin()">Sign In</button>
        </nav>

        <section class="hero">
            <div class="badge">v2.0 Beta</div>
            <h1>Intelligence for a <span class="text-gradient">Greener Future.</span></h1>
            <p>The world's first AI-driven sustainability workspace. Analyze eco-impact and chat with Sage.</p>
            
            <div class="hero-btns">
                <button id="hero-login-btn" class="btn-primary" onclick="handleLogin()">Start Chatting Free</button>
            </div>
        </section>

        <section class="features-grid">
            <div class="f-card"><h3>Eco-Analysis</h3><p>Gemini-powered insights.</p></div>
            <div class="f-card"><h3>Cloud Sync</h3><p>Securely saved via Supabase.</p></div>
        </section>
        <footer style="text-align:center; padding:40px; opacity:0.5;">Built by Rohnit Sahu</footer>
    </div>

    <div id="app-view">
        <aside id="sidebar">
            <div class="sidebar-top">
                <div class="logo">SAGE<span>AI</span></div>
                <button class="btn-primary" style="width:100%; margin-top:20px;" onclick="window.location.reload()">+ New Chat</button>
            </div>
            <div class="history-list" id="history-list"></div>
            <div class="sidebar-user">
                <span id="user-tag" style="font-size:0.8rem; opacity:0.7;">User</span>
                <button onclick="handleLogout()" style="background:none; border:none; color:#ff4757; cursor:pointer;">Logout</button>
            </div>
        </aside>

        <main id="chat-window" style="flex:1; display:flex; flex-direction:column;">
            <div id="messages-container" style="flex:1; overflow-y:auto; padding:20px;"></div>
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask Sage anything..." onkeypress="if(event.key==='Enter') handleSend()">
                    <button id="send-btn" onclick="handleSend()" style="background:var(--primary); border:none; padding:10px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SB_URL = 'https://YOUR_PROJECT_ID.supabase.co'; 
        const SB_KEY = 'YOUR_ANON_KEY';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        // --- 2. AUTH LOGIC ---
        async function checkSession() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').style.display = 'flex';
                document.getElementById('user-tag').innerText = currentUser.email.split('@')[0];
                loadHistory();
            }
        }

        async function handleLogin() {
            const btn = document.getElementById('hero-login-btn');
            btn.innerText = "Connecting...";
            btn.style.opacity = "0.7";

            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'github',
                options: { 
                    redirectTo: window.location.origin + window.location.pathname 
                }
            });
            if (error) {
                alert("Login Error: " + error.message);
                btn.innerText = "Start Chatting Free";
                btn.style.opacity = "1";
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // --- 3. CHAT LOGIC ---
        async function handleSend() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg || !currentUser) return;

            addBubble(msg, 'user');
            input.value = '';

            // Show Thinking Shimmer
            const loaderId = 'loader-' + Date.now();
            const container = document.getElementById('messages-container');
            const loadDiv = document.createElement('div');
            loadDiv.id = loaderId;
            loadDiv.className = 'msg sage';
            loadDiv.innerHTML = '<div class="typing-shimmer"></div>';
            container.appendChild(loadDiv);
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch(`https://sage-ai-nse9.onrender.com/chat?user_id=${currentUser.id}&message=${encodeURIComponent(msg)}`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                // Replace shimmer with text
                const loader = document.getElementById(loaderId);
                loader.innerHTML = ''; 
                loader.innerText = data.reply;
            } catch (err) {
                document.getElementById(loaderId).innerText = "Sage is currently waking up. Please retry in 10 seconds.";
            }
        }

        function addBubble(text, type) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function loadHistory() {
            const { data } = await supabaseClient.from('chat_history')
                .select('*').eq('user_id', currentUser.id)
                .order('created_at', { ascending: false }).limit(5);
            
            const histDiv = document.getElementById('history-list');
            if (data && data.length > 0) {
                histDiv.innerHTML = data.map(c => `<div class="history-item" style="padding:10px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:5px; font-size:0.8rem;">${c.message.substring(0, 20)}...</div>`).join('');
            }
        }

        // Run on start
        window.onload = checkSession;
    </script>
</body>
</html>
