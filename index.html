<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sage AI | Sustainable Workspace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="login-view" class="flex-center">
        <div class="glass-card">
            <h1 class="logo-text">SAGE<span>AI</span></h1>
            <p>Your Sustainable Intelligence Partner</p>
            <button class="btn-github" onclick="login()">Get Started with GitHub</button>
        </div>
        <footer class="landing-footer">Built by Rohnit Sahu &copy; 2026</footer>
    </div>

    <div id="app-view">
        <aside id="sidebar">
            <div class="sidebar-header">
                <button class="btn-new" onclick="startNewChat()">+ New Chat</button>
            </div>
            <div id="history-list" class="history-container">
                </div>
            <div class="sidebar-footer">
                <div id="user-info"></div>
                <button class="btn-icon" onclick="toggleSettings()">⚙️</button>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main id="chat-window">
            <header class="chat-header">
                <span id="chat-title">New Conversation</span>
            </header>
            
            <div id="messages-container">
                </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask Sage about eco-impact..." onkeypress="handleEnter(event)">
                    <button id="send-btn" onclick="send()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="modal flex-center">
        <div class="modal-content">
            <h3>Settings</h3>
            <label>AI Personality</label>
            <select id="ai-tone">
                <option value="friendly">Friendly Assistant</option>
                <option value="expert">Environmental Scientist</option>
            </select>
            <button class="btn-main" onclick="toggleSettings()">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
