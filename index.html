<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage AI | Developer Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2ecc71; --bg: #0f172a; --sidebar: #0b0f1a; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Login Screen */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-card { background: var(--glass); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); text-align: center; max-width: 400px; }
        .btn-github { width: 100%; padding: 14px; margin-top: 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; background: #24292e; color: white; transition: 0.3s; }
        .btn-github:hover { background: #333; transform: translateY(-2px); }

        /* Main Layout */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; }
        #chat-main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #1e293b, #0f172a); }
        
        .history-list { flex: 1; overflow-y: auto; margin: 20px 0; }
        .history-item { padding: 10px; border-radius: 6px; background: var(--glass); margin-bottom: 8px; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; }
        .history-item:hover { border-color: var(--primary); }

        #chat-container { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--primary); color: #000; }
        .sage { align-self: flex-start; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); }

        .input-area { padding: 20px; background: var(--sidebar); display: flex; gap: 10px; }
        input { flex: 1; background: var(--glass); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 8px; color: white; outline: none; }
        button#send { background: var(--primary); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .profile { border-top: 1px solid #333; padding-top: 15px; display: flex; justify-content: space-between; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-card">
            <h1 style="color: var(--primary);">SAGE AI</h1>
            <p style="opacity: 0.6; margin-top: 10px;">Sign in with GitHub to save your chats</p>
            <button class="btn-github" onclick="login()">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="20" style="filter: invert(1);">
                Continue with GitHub
            </button>
        </div>
    </div>

    <aside id="sidebar">
        <h3 style="color: var(--primary); font-size: 1rem;">Recent Chats</h3>
        <div class="history-list" id="history-list"></div>
        <div class="profile">
            <span id="user-email">...</span>
            <span style="color: #ff4757; cursor: pointer;" onclick="logout()">Logout</span>
        </div>
    </aside>

    <main id="chat-main">
        <div id="chat-container"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send" onclick="sendMessage()">Send</button>
        </div>
    </main>

    <script>
        const SB_URL = 'https://tdjtjgsrotfhnodbtmbj.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkanRqZ3Nyb3RmaG5vZGJ0bWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjM5NjIsImV4cCI6MjA5MDMzOTk2Mn0.jjlbqIjOOiy01Z6RbN6oTK0jdeNYxZ7XbeEg-wFb01A'; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('user-email').innerText = currentUser.email.split('@')[0];
                loadHistory();
            }
        }

        async function login() {
            await supabaseClient.auth.signInWithOAuth({ 
                provider: 'github',
                options: { redirectTo: window.location.origin }
            });
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            addBubble(text, 'user');
            input.value = '';

            const res = await fetch(`https://sage-ai-nse9.onrender.com/chat?user_id=${currentUser.id}&message=${encodeURIComponent(text)}`, {
                method: 'POST'
            });
            const data = await res.json();
            addBubble(data.reply, 'sage');
            loadHistory();
        }

        function addBubble(text, type) {
            const cont = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
        }

        async function loadHistory() {
            const { data } = await supabaseClient.from('chat_history')
                .select('*').eq('user_id', currentUser.id)
                .order('created_at', { ascending: false }).limit(10);
            
            document.getElementById('history-list').innerHTML = data.map(c => 
                `<div class="history-item">${c.message.substring(0, 25)}...</div>`
            ).join('');
        }

        checkUser();
    </script>
</body>
</html>
