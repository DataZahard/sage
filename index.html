<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage AI | Sustainable Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1e293b, var(--dark-bg));
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }

        header h1 { font-size: 1.5rem; color: var(--primary-green); letter-spacing: 1px; }
        header p { font-size: 0.8rem; opacity: 0.6; }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: var(--primary-green);
            color: #000;
            border-bottom-right-radius: 2px;
        }

        .sage-msg {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 2px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        input {
            flex: 1;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary-green);
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); }

        /* Loading Dots */
        .typing { font-style: italic; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>SAGE AI</h1>
        <p>Sustainable Commerce Expert</p>
    </header>

    <div id="chat-container">
        <div class="message sage-msg">Hello! I am Sage. Ask me anything about sustainable products or eco-friendly living.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Sage about sustainability..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const API_BASE = "https://sage-ai-nse9.onrender.com";
        const userId = "portfolio_user_" + Math.floor(Math.random() * 1000); // Unique ID for testing

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            // Add user message to UI
            appendMessage(message, 'user-msg');
            input.value = '';

            // Add loading indicator
            const loadingId = appendMessage('Sage is thinking...', 'sage-msg typing');

            try {
                // Call your LIVE Render backend
                const response = await fetch(`${API_BASE}/chat?user_id=${userId}&message=${encodeURIComponent(message)}`, {
                    method: 'POST'
                });

                const data = await response.json();
                
                // Remove loading and add real response
                document.getElementById(loadingId).remove();
                appendMessage(data.reply, 'sage-msg');

                if(data.escalate) {
                    appendMessage("⚠️ *Priority Alert:* I've flagged this for a human specialist.", "sage-msg");
                }
            } catch (error) {
                document.getElementById(loadingId).innerText = "Connection Error. Is the backend awake?";
            }
        }

        function appendMessage(text, className) {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            const id = 'msg-' + Date.now();
            msgDiv.id = id;
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
